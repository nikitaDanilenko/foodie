name: Build and publish Docker image

description: Builds and pushes a Docker image to Docker Hub

inputs:
  version-tag:
    description: 'Version tag for the Docker image'
    required: true
  image-name:
    description: 'Docker Hub image name (e.g. nikitadanilenko/foodie)'
    required: true
  context:
    description: 'Docker build context path'
    required: true
  docker-hub-username:
    description: 'Docker Hub username'
    required: true
  docker-hub-token:
    description: 'Docker Hub access token'
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    - name: Log in to DockerHub
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        username: ${{ inputs.docker-hub-username }}
        password: ${{ inputs.docker-hub-token }}
    - name: Set metadata
      id: metadata
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ inputs.image-name }}
        tags: |
          type=sha
          type=raw,value=latest
          type=semver,pattern={{version}},value=${{ inputs.version-tag }}
    - name: Build and push Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ${{ inputs.context }}
        push: true
        tags: ${{ steps.metadata.outputs.tags }}
