name: Build and publish Docker image
description: Builds and pushes a Docker image to Docker Hub

inputs:
  version-tag:
    description: 'Version tag for the Docker image'
    required: true
  image-name:
    description: 'Docker Hub image name (e.g. nikitadanilenko/foodie)'
    required: true
  context:
    description: 'Docker build context path'
    required: true
  docker-hub-username:
    description: 'Docker Hub username'
    required: true
  docker-hub-token:
    description: 'Docker Hub access token'
    required: true

runs:
  using: composite
  steps:
    - name: Check out repository
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - name: Log in to DockerHub
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        username: ${{ inputs.docker-hub-username }}
        password: ${{ inputs.docker-hub-token }}
    - name: Set metadata
      id: metadata
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ${{ inputs.image-name }}
        tags: |
          type=sha
          type=raw,value=latest
          type=semver,pattern={{version}},value=${{ inputs.version-tag }}
    - name: Build and push Docker image
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: ${{ inputs.context }}
        push: true
        tags: ${{ steps.metadata.outputs.tags }}
