name: Build and publish Docker image

description: Builds and pushes a Docker image to Docker Hub

inputs:
  version-tag:
    description: 'Version tag for the Docker image'
    required: true
  image-name:
    description: 'Docker Hub image name (e.g. nikitadanilenko/foodie)'
    required: true
  context:
    description: 'Docker build context path'
    required: true
  docker-hub-username:
    description: 'Docker Hub username'
    required: true
  docker-hub-token:
    description: 'Docker Hub access token'
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
    - name: Log in to DockerHub
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        username: ${{ inputs.docker-hub-username }}
        password: ${{ inputs.docker-hub-token }}
    - name: Set metadata
      id: metadata
      uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
      with:
        images: ${{ inputs.image-name }}
        tags: |
          type=sha
          type=raw,value=latest
          type=semver,pattern={{version}},value=${{ inputs.version-tag }}
    - name: Build and push Docker image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: ${{ inputs.context }}
        push: true
        tags: ${{ steps.metadata.outputs.tags }}
