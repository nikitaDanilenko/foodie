name: Release new version (Image, GitHub, GitOps)

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - '.github/**'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
  queue: max

permissions: {}

jobs:
  create_new_version:
    name: Create New Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version-tag: ${{ steps.semantic-version.outputs.version_tag }}
      version: ${{ steps.semantic-version.outputs.version }}
      back-end-paths-changed: ${{ steps.back-end.outputs.back-end-src }}
      front-end-paths-changed: ${{ steps.front-end.outputs.front-end-src }}
      deployment-changed: ${{ steps.deployment.outputs.deployment }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # Depth setting is necessary for the semantic-version action.
        with:
          fetch-depth: 0
      - name: Determine version
        id: semantic-version
        uses: paulhatch/semantic-version@9f72830310d5ed81233b641ee59253644cd8a8fc # v6.0.2
        with:
          # Since version 6.0.0, the action uses conventional commits.
          major_pattern: "/(major)/i"
          minor_pattern: "/(minor)/i"
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: back-end
        with:
          base: "main"
          filters: |
            back-end-src:
              - 'app/**'
              - 'test/**' 
              - 'conf/**' 
              - 'scripts/**'
              - 'build.sbt'
              - 'project/**'
              - '.scalafmt.conf'
              - 'Dockerfile'
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: front-end
        with:
          base: "main"
          filters: |
            front-end-src:
              - 'frontend/**'
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: deployment
        with:
          base: "main"
          filters: |
            deployment:
              - 'deployment/**'
      - name: Publish new release
        if: steps.back-end.outputs.back-end-src == 'true' || steps.front-end.outputs.front-end-src == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION_TAG: ${{ steps.semantic-version.outputs.version_tag }}
          TARGET_SHA: ${{ github.sha }}
        run: gh release create "$VERSION_TAG" --target "$TARGET_SHA" --generate-notes

  build_and_publish_back_end:
    name: Build and Publish Back End Image
    needs:
      - create_new_version
    # The output is a string, hence the string comparison.
    if: ${{ needs.create_new_version.outputs.back-end-paths-changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/build-and-publish
        with:
          version-tag: ${{ needs.create_new_version.outputs.version-tag }}
          image-name: nikitadanilenko/foodie
          context: .
          docker-hub-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          docker-hub-token: ${{ secrets.DOCKER_HUB_TOKEN }}

  build_and_publish_front_end:
    name: Build and Publish Front End Image
    needs:
      - create_new_version
    # The output is a string, hence the string comparison.
    if: ${{ needs.create_new_version.outputs.front-end-paths-changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/build-and-publish
        with:
          version-tag: ${{ needs.create_new_version.outputs.version-tag }}
          image-name: nikitadanilenko/foodie-frontend
          context: frontend
          docker-hub-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          docker-hub-token: ${{ secrets.DOCKER_HUB_TOKEN }}

  update_gitops:
    name: Update GitOps Manifests
    needs:
      - create_new_version
      - build_and_publish_back_end
      - build_and_publish_front_end
    # Run when any deployable change happened (source built, or manifest-only edit).
    if: >-
      ${{ always() && needs.create_new_version.result == 'success'
          && (needs.create_new_version.outputs.back-end-paths-changed == 'true'
              || needs.create_new_version.outputs.front-end-paths-changed == 'true'
              || needs.create_new_version.outputs.deployment-changed == 'true') }}
    uses: ./.github/workflows/_update-gitops-manifests.yml
    with:
      back-end-version: ${{ needs.build_and_publish_back_end.result == 'success' && needs.create_new_version.outputs.version || '' }}
      front-end-version: ${{ needs.build_and_publish_front_end.result == 'success' && needs.create_new_version.outputs.version || '' }}
    secrets: inherit
