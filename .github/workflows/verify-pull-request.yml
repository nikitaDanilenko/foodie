name: Verify pull request

on:
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      back-end-paths-changed: ${{ steps.back-end.outputs.back-end-src }}
      front-end-paths-changed: ${{ steps.front-end.outputs.front-end-src }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: back-end
        with:
          filters: |
            back-end-src:
              - 'app/**'
              - 'test/**' 
              - 'conf/**' 
              - 'scripts/**'
              - 'build.sbt'
              - 'project/**'
              - '.scalafmt.conf'
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: front-end
        with:
          filters: |
            front-end-src:
              - 'frontend/**'

  back-end-test:
    needs: changes
    # The output is a string, hence the string comparison.
    if: ${{ needs.changes.outputs.back-end-paths-changed == 'true' }}
    uses: ./.github/workflows/_scala-tests.yml

  front-end-test:
    needs: changes
    # The output is a string, hence the string comparison.
    if: ${{ needs.changes.outputs.front-end-paths-changed == 'true' }}
    uses: ./.github/workflows/_elm-tests.yml

  combine-tests:
    needs:
      - back-end-test
      - front-end-test
    runs-on: ubuntu-latest
    permissions: {}
    # Must always run so that, when set as a required check, a skipped upstream
    # failure cannot be treated as a passing required check by branch protection.
    if: always()
    steps:
      - name: Verify upstream
        run: |
          be='${{ needs.back-end-test.result }}'
          fe='${{ needs.front-end-test.result }}'
          if [[ "$be" != "success" && "$be" != "skipped" ]] || \
             [[ "$fe" != "success" && "$fe" != "skipped" ]]; then
            echo "Tests failed: back-end=$be, front-end=$fe"
            exit 1
          fi
          echo "All tests passed"
