# Foodie Helm Chart Values

# Backend configuration
backend:
  image:
    repository: nikitadanilenko/foodie
    tag: latest
    pullPolicy: Always
  port: 9000
  replicaCount: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Frontend configuration
frontend:
  image:
    repository: nikitadanilenko/foodie-frontend
    tag: latest
    pullPolicy: Always
  port: 80
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

# PostgreSQL configuration
postgres:
  image:
    repository: postgres
    tag: "12.11-alpine"
    pullPolicy: IfNotPresent
  port: 5432
  database: foodie
  username: foodie
  storage:
    size: 1Gi

# Ingress configuration
ingress:
  host: foodie.danilenko.io
  clusterIssuer: letsencrypt-prod

# Environment configuration (non-secret values)
config:
  jwtDurationSeconds: "86400"
  jwtPublicKey: ""
  mailerHost: "localhost"
  mailerFrom: "foodie@localhost"
  mailerPort: "1025"

